<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <fieldset>
        <legend>Selection options list</legend>
        <label for="checkbox1">Checkbox</label>
        <input type="checkbox" name="" id="checkbox1" /><br />
        <label for="btn1">RadioButton1:</label>
        <input type="radio" id="btn1" name="radioBtn" />
        <br />
        <label for="btn2">RadioButton2:</label>
        <input type="radio" id="btn2" name="radioBtn" />
      </fieldset>

      <br />

      <fieldset>
        <legend>Input text</legend>
        <label for="loginId">Login Id:</label>
        <input type="text" id="loginId" />
        <br /><br />
        <label for="password">Password:</label>
        <input type="text" id="password" />
      </fieldset>
      <br />
      <fieldset>
        <legend>Employee Designation</legend>
        <input type="checkbox" id="1" />
        <label for="1">Software Engineer</label>
        <br />
        <input type="checkbox" id="2" />
        <label for="2">Data Analyst</label>
        <br />
        <input type="checkbox" id="3" />
        <label for="3">Web Developer</label>
        <br />
        <input type="checkbox" id="4" />
        <label for="4">Senior Analyst</label>
      </fieldset>
      <br />
      <input type="button" value="press" />
      <input type="reset" />
    </form>
  </body>
</html>
