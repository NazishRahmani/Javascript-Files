<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <fieldset>
      <legend>Your Details</legend>
      <br />
      <label for="name">1. Name</label>
      <input
        type="text"
        placeholder="full name"
        name=""
        id="name"
      /><br /><br />
      <label for="email">2. Email</label>
      <input
        type="email"
        placeholder="example@domain.com"
        name=""
        id="email"
      /><br /><br />
      <label for="phone">3. Phone</label>
      <input type="tel" placeholder="123-456-7890" name="" id="phone" /><br />
    </fieldset>
    <br />
    <fieldset>
      <legend>Delivery Address</legend>
      <label for="add">1. Address</label>
      <textarea name="" cols="20" rows="4" id=""></textarea>
      <br /><br />
      <label for="postcode">2. Postcode</label>
      <input type="number" name="" id="postcode" />
      <br /><br />
      <label for="country">3. Country</label>
      <input type="text" />
    </fieldset>
    <br />
    <fieldset>
      <legend>Card Details</legend>

      <fieldset>
        <legend>Card type</legend>
        <input type="radio" id="1" />
        <label for="1">VISA</label><br />
        <input type="radio" id="2" />
        <label for="2">AmEx</label><br />
        <input type="radio" id="3" />
        <label for="3">Mastercard</label>
      </fieldset>
      <br />
      <label for="nmbr">2. Card number</label>
      <input type="number" name="" id="nmbr" /><br />
      <label for="code">3. Security Code</label>
      <input type="number" name="" id="code" /> <br />
      <label for="name">4. Name on card</label>
      <input type="text" name="" id="name" /> <br />
    </fieldset>
    <br />
    <fieldset>
      <input type="button" value="Buy It" name="" id="" />
    </fieldset>
  </body>
</html>
