<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <label for="first">FirstName:</label>
    <input type="text" id="first" placeholder="First" /><br /><br />
    <label for="second">LastName:</label>
    <input type="text" id="second" placeholder="surname" />

    <br /><br />

    <input id="male" type="radio" name="gender" />
    <label for="male">Male</label><br />
    <input id="female" type="radio" name="gender" />
    <label for="female">Female</label><br />

    <br /><br />

    <input type="checkbox" id="checkbox1" />
    <label for="checkbox1">I agree to the terms and conditions</label>

    <br /><br />

    <input type="checkbox" id="html" />
    <label for="html">HTML</label><br />
    <input type="checkbox" id="css" />
    <label for="css">CSS</label><br />
    <input type="checkbox" id="js" />
    <label for="js">JS</label>

    <br /><br />

    <input type="submit" value="hii" />
    <input type="submit" value="submit" />

    <br /><br />

    <select>
      <option value="">India</option>
      <option value="">Pakistan</option>
      <option value="">Nepal</option>
    </select>

    <br /><br />

    <textarea
      placeholder="comment here..."
      name=""
      id=""
      cols="40"
      rows="5"
    ></textarea>

    <br /><br /><br />

    <fieldset>
      <legend>Choose your favorite color:</legend>
      <input type="radio" name="color" value="red" />
      <label for="red">Red</label><br />
      <input type="radio" name="color" value="blue" />
      <label for="blue">Blue</label><br />
      <input type="radio" name="color" value="green" />
      <label for="green">Green</label><br />
    </fieldset>

    <br /><br /><br />

    <input type="file" />

    <br /><br /><br />

    <input type="number" name="" id="" />
    <br />
    <input type="date" name="" id="" /><br />
    <input type="password" name="" id="" /><br />
    <input type="range" name="" id="" />
    <br /><br /><br />
  </body>
</html>
