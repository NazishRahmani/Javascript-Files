<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>Hello i am Nazish</p>
    <p>Hello i am <b>Nazish</b></p>
    <p>Hello i am <i>Nazish</i></p>
    <p>
      Hello i am <b><i>Nazish</i></b>
    </p>
    <p>
      Hello i am <del><b>Nazish</b></del>
    </p>
    <p>Hello I am <ins>Nazish</ins></p>
    <p>Hello I am <em>Nazish</em></p>

    <p>I am <strong>Nazish</strong></p>
    <p>I am <mark>Nazish</mark></p>
    <p>I am <small>Nazish</small></p>
    <p>H<sub>2</sub>O </p>
    <p>2<sup>2</sup> = 4</p>
  </body>
</html>
